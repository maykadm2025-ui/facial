<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Aluno</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="flex flex-col items-center justify-start">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Captura de Rosto</h2>
            <div class="relative w-full h-64 bg-black rounded-md overflow-hidden">
                <video id="video" class="w-full h-full object-cover" autoplay></video>
            </div>
            <canvas id="canvas" class="hidden"></canvas>
            
            <button id="btn-capturar" type="button" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded w-full transition duration-300">
                Tirar Foto
            </button>
            <p id="foto-status" class="text-sm text-green-600 mt-2 hidden font-semibold">✔ Foto capturada!</p>
            
            <div id="relatorio-container" class="mt-6 w-full hidden">
                <h3 class="text-lg font-bold mb-2 text-gray-700 text-center border-b pb-2">Relatório de Alunos</h3>
                <div id="relatorio-lista" class="space-y-3 max-h-[400px] overflow-y-auto w-full p-2">
                    </div>
            </div>
        </div>

        <div>
            <h2 class="text-xl font-bold mb-4 text-gray-700">Dados do Aluno</h2>
            <form id="form-cadastro" class="space-y-4">
                
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Nome Completo</label>
                    <input type="text" id="nome" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Turma</label>
                    <select id="turma" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="" disabled selected>Selecione a Turma...</option>
                        <optgroup label="Ensino Fundamental">
                            <option value="1º Ano EF">1º Ano EF</option>
                            <option value="2º Ano EF">2º Ano EF</option>
                            <option value="3º Ano EF">3º Ano EF</option>
                            <option value="4º Ano EF">4º Ano EF</option>
                            <option value="5º Ano EF">5º Ano EF</option>
                            <option value="6º Ano EF">6º Ano EF</option>
                            <option value="7º Ano EF">7º Ano EF</option>
                            <option value="8º Ano EF">8º Ano EF</option>
                            <option value="9º Ano EF">9º Ano EF</option>
                        </optgroup>
                        <optgroup label="Ensino Médio">
                            <option value="1º Ano EM">1º Ano EM</option>
                            <option value="2º Ano EM">2º Ano EM</option>
                            <option value="3º Ano EM">3º Ano EM</option>
                        </optgroup>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Turno</label>
                    <select id="turno" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="" disabled selected>Selecione o Turno...</option>
                        <option value="Manhã">Manhã</option>
                        <option value="Tarde">Tarde</option>
                        <option value="Noite">Noite</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Horário de Entrada</label>
                        <input type="text" id="entrada" readonly class="w-full px-3 py-2 border bg-gray-50 rounded-md text-gray-500 cursor-not-allowed font-mono" placeholder="Automático">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">Status</label>
                        <select id="status" required class="w-full px-3 py-2 border rounded-md bg-gray-100 focus:outline-none">
                            <option value="Cadastrado" selected>Cadastrado</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded transition duration-300 mt-4">
                    Salvar Cadastro
                </button>
            </form>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnCapturar = document.getElementById('btn-capturar');
        const formCadastro = document.getElementById('form-cadastro');
        const fotoStatus = document.getElementById('foto-status');
        const inputEntrada = document.getElementById('entrada');
        
        let fotoBase64 = '';

        function atualizarHorario() {
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            inputEntrada.value = `${horas}:${minutos}`;
        }

        atualizarHorario();
        setInterval(atualizarHorario, 60000);

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { console.error("Erro ao acessar câmera:", err); });

        btnCapturar.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            fotoBase64 = canvas.toDataURL('image/jpeg');
            fotoStatus.classList.remove('hidden');
        });

        // Função para buscar o relatório
        async function fetchRelatorio() {
            try {
                const response = await fetch('/api/relatorio');
                const resultado = await response.json();
                
                const container = document.getElementById('relatorio-container');
                const lista = document.getElementById('relatorio-lista');
                
                if (resultado.sucesso && resultado.dados && resultado.dados.length > 0) {
                    container.classList.remove('hidden');
                    lista.innerHTML = ''; 
                    
                    // Campos que NÃO devem aparecer no relatório
                    const camposOcultos = ['descriptor', 'foto_base64', 'id', 'criado_em'];

                    resultado.dados.forEach(aluno => {
                        let detalhesHTML = '';
                        for (const [chave, valor] of Object.entries(aluno)) {
                            if (!camposOcultos.includes(chave)) {
                                detalhesHTML += `<p class="text-xs text-gray-700"><strong>${chave.toUpperCase()}:</strong> ${valor}</p>`;
                            }
                        }
                        
                        lista.innerHTML += `
                            <div class="bg-gray-50 border-l-4 border-blue-500 p-3 rounded shadow-sm">
                                ${detalhesHTML}
                            </div>
                        `;
                    });
                } else {
                    container.classList.add('hidden');
                }
            } catch (error) {
                console.error("Erro ao carregar relatório:", error);
            }
        }

        // Carregar relatório ao iniciar a página
        document.addEventListener('DOMContentLoaded', fetchRelatorio);

        formCadastro.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if(!fotoBase64) {
                alert("Capture a foto primeiro!");
                return;
            }

            const payload = {
                nome: document.getElementById('nome').value,
                turma: document.getElementById('turma').value,
                turno: document.getElementById('turno').value,
                entrada: inputEntrada.value,
                status: document.getElementById('status').value,
                foto: fotoBase64
            };

            try {
                const response = await fetch('/api/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const resultado = await response.json();
                
                if(resultado.sucesso) {
                    alert("Aluno cadastrado com sucesso!");
                    formCadastro.reset();
                    fotoBase64 = '';
                    fotoStatus.classList.add('hidden');
                    atualizarHorario();
                    // Atualiza o relatório caso o status mude
                    fetchRelatorio();
                } else {
                    alert("Erro: " + resultado.erro);
                }
            } catch (erro) {
                alert("Erro ao conectar com o servidor.");
            }
        });
    </script>
</body>
</html>
